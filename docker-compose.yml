services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "50051:50051" # gRPC (native)
      - "8080:8080"   # gRPC-Web (browser)

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_URL: "http://localhost:8080"
    ports:
      - "8081:80"
    depends_on:
      - backend

