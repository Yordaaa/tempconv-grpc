apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempconv-backend
  labels:
    app: tempconv-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempconv-backend
  template:
    metadata:
      labels:
        app: tempconv-backend
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: backend
          image: tempconv-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
            - name: grpcweb
              containerPort: 8080
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: WEB_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /
              port: grpcweb
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: grpcweb
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

